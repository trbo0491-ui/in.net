<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nghe nhạc MP3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <style>
        .service-detail {
            padding: 60px 10%;
            max-width: 900px;
            margin: auto;
            text-align: center;
        }

        .service-detail h2 {
            font-size: 30px;
            margin-bottom: 20px;
        }

        .service-detail p {
            font-size: 16px;
            line-height: 1.7;
            color: #444;
            margin-bottom: 20px;
        }

        .music-box {
            margin-top: 40px;
            padding: 30px;
            border-radius: 15px;
            background: #f5f5f5;
        }

        audio {
            width: 100%;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<header class="header">
    <h1>Nghe nhạc</h1>
    <nav>
        <a href="index.html">Trang chủ</a>
        <a href="services.html">Dịch vụ</a>
        <a href="contact.html">Liên hệ</a>
    </nav>
</header>

<section class="service-detail">
    <h2>🎧 Góc nghe nhạc MP3</h2>

    <p>
        Đây là nơi để <b>nghe nhạc MP3</b> – gọn nhẹ, dễ dùng, không màu mè.
    </p>

    <div class="music-box">
        <h3>🎵 Bài hát đang phát</h3>

        <audio controls>
            <source src="music.mp3" type="audio/mpeg">
            Trình duyệt của bạn không hỗ trợ phát nhạc.
        </audio>

        <p style="margin-top:10px; font-size:14px; color:#666;">
            (Đặt file nhạc cùng thư mục và đổi tên cho đúng)
        </p>
    </div>
</section>

<footer class="footer">
    © 2026 😊
</footer>

</body>
</html>
